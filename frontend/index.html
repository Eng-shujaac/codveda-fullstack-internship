<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Task Management System</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="page">
      <section class="container">
        <header class="page-header">
          <h1>Task Management System</h1>
          <p>Codveda Full-Stack Development Internship</p>
        </header>

        <section class="task-form-section" aria-labelledby="form-title">
          <h2 id="form-title">Create New Task</h2>
          <form id="task-form" class="task-form">
            <div class="form-group">
              <label for="title">Title</label>
              <input
                type="text"
                id="title"
                name="title"
                placeholder="Enter task title"
                required
              />
            </div>

            <div class="form-group">
              <label for="description">Description</label>
              <textarea
                id="description"
                name="description"
                rows="3"
                placeholder="Enter task description"
              ></textarea>
            </div>

            <div class="form-group">
              <label for="status">Status</label>
              <select id="status" name="status">
                <option value="pending">Pending</option>
                <option value="completed">Completed</option>
              </select>
            </div>

            <button type="submit">Add Task</button>
          </form>
        </section>

        <section class="task-list-section" aria-labelledby="tasks-title">
          <div class="section-header">
            <h2 id="tasks-title">Tasks</h2>
            <p id="task-count">0 tasks</p>
          </div>

          <p id="message" class="message" role="status"></p>
          <div id="task-list" class="task-list"></div>
        </section>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
